name: Deploy Vue to Lighthouse

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
          npm run build

      - name: Upload dist to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: root
          TARGET: /root/vue-dist

      - name: Deploy via Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker stop vue-app || true
            docker rm vue-app || true
            docker run -d \
              --name vue-app \
              --restart always \
              -p 80:80 \
              -v /root/vue-dist:/usr/share/nginx/html \
              nginx:alpine