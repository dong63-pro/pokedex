name: Deploy Vue to Lighthouse

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
          npm run build

      # 用 scp-action 替换原来的 ssh-deploy，兼容性更好
      - name: Upload dist to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: /root/vue-dist
          strip_components: 1

      - name: Deploy via Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker stop vue-app || true
            docker rm vue-app || true
            docker run -d \
              --name vue-app \
              --restart always \
              -p 80:80 \
              -v /root/vue-dist:/usr/share/nginx/html \
              nginx:alpine