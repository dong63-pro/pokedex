name: 宝可梦图鉴自动化部署

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build

      - name: 上传文件到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/,Dockerfile"
          target: "/root/pokedex-deploy"
          timeout: 180s

      - name: 部署并启动 Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 300s
          script: |
            cd /root/pokedex-deploy
            docker rm -f pokedex 2>/dev/null || true
            docker build -t pokedex:latest .
            docker run -d -p 80:80 --name pokedex --restart unless-stopped pokedex:latest
            sleep 2
            docker ps | grep pokedex